<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Messagerie Pro</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 400px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      background: #4a90e2;
      color: white;
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
      text-align: center;
    }

    .messages {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
    }

    .message {
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 8px;
      background: #e9efff;
    }

    .meta {
      font-size: 12px;
      color: #555;
      margin-bottom: 3px;
    }

    .input-area {
      display: flex;
      border-top: 1px solid #ddd;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    button {
      background: #4a90e2;
      color: white;
      border: none;
      padding: 10px 15px;
      cursor: pointer;
    }

    button:hover {
      background: #357ABD;
    }

    .top-input {
      display: flex;
      border-bottom: 1px solid #ddd;
    }

    .top-input input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="header">💬 Messagerie</div>

  <div class="top-input">
    <input id="name" placeholder="Ton pseudo">
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <input id="message" placeholder="Ton message">
    <button onclick="sendMessage()">Envoyer</button>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "846140280738",
    authDomain: "messagerie.firebaseapp.com",
    databaseURL: "https://messagerie-cd2ba-default-rtdb.europe-west1.firebasedatabase.app/",
    projectId: "messagerie",
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  function sendMessage() {
    const name = document.getElementById("name").value;
    const text = document.getElementById("message").value;

    if (!name || !text) return;

    const now = new Date();

    db.ref("messages").push({
      name: name,
      text: text,
      date: now.toLocaleDateString(),
      time: now.toLocaleTimeString()
    });

    document.getElementById("message").value = "";
  }

  db.ref("messages").on("child_added", function(snapshot) {
    const msg = snapshot.val();

    const div = document.createElement("div");
    div.classList.add("message");

    const meta = document.createElement("div");
    meta.classList.add("meta");
    meta.textContent = `${msg.name} • ${msg.date} ${msg.time}`;

    const content = document.createElement("div");
    content.textContent = msg.text;

    div.appendChild(meta);
    div.appendChild(content);

    document.getElementById("messages").appendChild(div);
  });
</script>

</body>
</html>
