<!doctype html>

<body>
  <header>
    <h1>Contact List — Virtual SIM Chat</h1>
    <div class="top-controls">
      <a href="esim.html" class="secondary" style="padding:8px 10px;display:inline-flex;align-items:center;margin-right:6px">eSIMs</a>
      <a href="list.html" class="secondary" style="padding:8px 10px;display:inline-flex;align-items:center;margin-right:6px">List</a>
      <select id="activeSimSelect" class="input"></select>
      <button id="exportBtn" class="secondary">Export JSON</button>
      <button id="importBtn" class="secondary">Import</button>
      <button id="clearBtn" class="secondary">Clear All</button>
    </div>
  </header>

  <main class="container">
    <section class="panel" id="contactsPanel">
      <h3>Contacts</h3>
      <div class="form-row">
        <input id="contactName" class="input" placeholder="Name" />
        <input id="contactEmail" class="input" placeholder="Email (optional)" />
        <button id="addContactBtn">Add</button>
      </div>
      <ul id="contactsList" class="list"></ul>
    </section>

    <section class="panel" id="simsPanel">
      <h3>SIMs</h3>
      <div id="simsForContactHeader" class="small">Select a contact to manage SIMs</div>
      <div id="simsControls" style="display:none" class="form-row">
        <input id="simLabel" class="input" placeholder="SIM label (e.g., Work)" />
        <button id="addSimBtn">Add SIM</button>
      </div>
      <div id="simsList"></div>
    </section>

    <section class="panel" id="chatPanel">
      <h3>Chat</h3>
      <div class="small">Select an active SIM above and a recipient SIM below to chat.</div>

      <div class="form-row">
        <select id="recipientSimSelect" class="input"></select>
        <input id="messageInput" class="input" placeholder="Type a message..." />
        <button id="sendBtn">Send</button>
      </div>

      <div id="chatLog" class="chat-log"></div>

      <div class="footer">
        <div class="small" id="statusInfo">No SIM selected</div>
        <div>
          <button id="downloadDump" class="secondary">Download Dump</button>
        </div>
      </div>
    </section>
  </main>

  <input id="importFile" type="file" accept="application/json" style="display:none" />

  <script>
  (()=>{
    const KEY = 'virtual_sim_comms_v1';
    let state = {contacts:[], messages:[], selectedContactId:null, selectedSimId:null, activeSimId:null, recipientSimId:null};
    const uid = (p='id')=>p+'_'+Math.random().toString(36).slice(2,9);
    function save(){ localStorage.setItem(KEY, JSON.stringify({contacts:state.contacts, messages:state.messages})); }
    function load(){ const raw = localStorage.getItem(KEY); if(!raw) return; try{ const parsed = JSON.parse(raw); state.contacts = parsed.contacts||[]; state.messages = parsed.messages||[]; }catch(e){console.error(e)} }
    function getAllSims(){ let list=[]; state.contacts.forEach(c=> (c.sims||[]).forEach(s=>list.push({contactId:c.id, contactName:c.name, sim:s}))); return list; }

    function renderContacts(){ const el=document.getElementById('contactsList'); el.innerHTML=''; state.contacts.forEach(c=>{ const li=document.createElement('li'); li.className='contact-item'; li.dataset.id=c.id; li.innerHTML='<div><strong>'+escapeHtml(c.name)+'</strong><div class="small">'+(c.email||'')+'</div></div><div style="display:flex;gap:8px;align-items:center"><span class="badge">'+((c.sims||[]).length)+' SIM</span><button data-action="manage" class="secondary">Manage</button></div>'; el.appendChild(li); li.addEventListener('click',(e)=>selectContact(c.id)); }); }

    function renderSims(){ const header=document.getElementById('simsForContactHeader'); const controls=document.getElementById('simsControls'); const list=document.getElementById('simsList'); list.innerHTML=''; const contact = state.contacts.find(x=>x.id===state.selectedContactId); if(!contact){ header.textContent='Select a contact to manage SIMs'; controls.style.display='none'; return; } header.textContent='SIMs for '+contact.name; controls.style.display='flex'; (contact.sims||[]).forEach(s=>{ const div=document.createElement('div'); div.className='sim-card'; div.dataset.id=s.id; div.innerHTML='<div><strong>'+escapeHtml(s.label||'SIM')+'</strong><div class="small">ICCID: '+s.number+'</div></div><div style="display:flex;gap:8px"><button data-action="select" class="secondary">Select</button><button data-action="delete" class="secondary">Delete</button></div>'; list.appendChild(div); div.querySelector('button[data-action="select"]').addEventListener('click',()=>{ state.recipientSimId = s.id; renderRecipientSelect(); renderChat(); }); div.querySelector('button[data-action="delete"]').addEventListener('click',()=>{ if(!confirm('Delete SIM?')) return; contact.sims = (contact.sims||[]).filter(x=>x.id!==s.id); if(state.activeSimId===s.id) state.activeSimId=null; if(state.recipientSimId===s.id) state.recipientSimId=null; save(); renderAll(); }); }); }

    function renderActiveSimSelect(){ const sel=document.getElementById('activeSimSelect'); sel.innerHTML='<option value="">Select active SIM (computer)</option>'; getAllSims().forEach(entry=>{ const opt=document.createElement('option'); opt.value=entry.sim.id; opt.textContent=entry.contactName+' — '+entry.sim.label; sel.appendChild(opt); }); sel.value = state.activeSimId || ''; sel.onchange = (e)=>{ state.activeSimId = e.target.value || null; save(); renderChat(); renderStatus(); } }

    function renderRecipientSelect(){ const sel=document.getElementById('recipientSimSelect'); sel.innerHTML=''; const placeholder=document.createElement('option'); placeholder.value=''; placeholder.textContent='Choose recipient SIM'; sel.appendChild(placeholder); getAllSims().forEach(entry=>{ const opt=document.createElement('option'); opt.value=entry.sim.id; opt.textContent=entry.contactName+' — '+entry.sim.label; sel.appendChild(opt); }); sel.value = state.recipientSimId || ''; sel.onchange = (e)=>{ state.recipientSimId = e.target.value || null; renderChat(); } }

    function renderChat(){ const log=document.getElementById('chatLog'); log.innerHTML=''; const from=state.activeSimId; const to=state.recipientSimId; if(!from || !to){ log.innerHTML = '<div class="small">Select both an active SIM and a recipient SIM to view messages.</div>'; renderStatus(); return; } const msgs = state.messages.filter(m=> (m.from===from && m.to===to) || (m.from===to && m.to===from)).sort((a,b)=>a.ts-b.ts); msgs.forEach(m=>{ const d=document.createElement('div'); d.className='msg '+(m.from===from ? 'out':'in'); const time = new Date(m.ts).toLocaleString(); d.innerHTML = '<div>'+escapeHtml(m.text)+'</div><div class="small">'+time+'</div>'; log.appendChild(d); }); log.scrollTop = log.scrollHeight; renderStatus(); }

    function renderStatus(){ const s = document.getElementById('statusInfo'); if(!state.activeSimId){ s.textContent='No active SIM'; return; } const active = findSimById(state.activeSimId); const recip = state.recipientSimId ? findSimById(state.recipientSimId) : null; s.textContent = 'Using: ' + (active ? active.contactName+' — '+active.sim.label : 'Unknown') + (recip ? '  |  Chatting with: '+recip.contactName+' — '+recip.sim.label : ''); }

    function findSimById(id){ for(const c of state.contacts){ for(const s of (c.sims||[])){ if(s.id===id) return {contact:c, sim:s, contactName:c.name}; } } return null; }

    function addContact(name,email){ const id=uid('c'); state.contacts.push({id,name,email,sims:[]}); save(); renderAll(); selectContact(id); }
    function addSimToContact(contactId,label){ const contact = state.contacts.find(c=>c.id===contactId); if(!contact) return; const sId = uid('s'); const number = Math.floor(100000000000 + Math.random()*900000000000).toString(); contact.sims.push({id:sId,label:label||'SIM',number}); save(); renderAll(); state.recipientSimId = sId; renderChat(); }
    function sendMessage(text,from,to){ if(!text||!from||!to) return; const msg={id:uid('m'),from,to,text,ts:Date.now()}; state.messages.push(msg); save(); renderChat(); }
    function selectContact(id){ state.selectedContactId = id; renderSims(); renderContacts(); }
    function exportJSON(){ const blob = new Blob([JSON.stringify({contacts:state.contacts,messages:state.messages},null,2)], {type:'application/json'}); const url = URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='virtual_sim_export.json'; a.click(); URL.revokeObjectURL(url); }
    function importJSONFile(file){ const r=new FileReader(); r.onload=(e)=>{ try{ const parsed=JSON.parse(e.target.result); if(Array.isArray(parsed.contacts)) state.contacts=parsed.contacts; if(Array.isArray(parsed.messages)) state.messages=parsed.messages; save(); renderAll(); }catch(err){ alert('Invalid JSON'); } }; r.readAsText(file); }
    function clearAll(){ if(!confirm('Clear all contacts, SIMs and messages?')) return; state.contacts=[]; state.messages=[]; state.activeSimId=null; state.recipientSimId=null; save(); renderAll(); }
    function escapeHtml(s){ if(!s) return ''; return s.replace(/[&<>"']/g,(m)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m])); }

    function renderAll(){ renderContacts(); renderSims(); renderActiveSimSelect(); renderRecipientSelect(); renderChat(); }

    document.addEventListener('DOMContentLoaded', ()=>{
      load(); renderAll();
      document.getElementById('addContactBtn').addEventListener('click', ()=>{ const name=document.getElementById('contactName').value.trim(); const email=document.getElementById('contactEmail').value.trim(); if(!name) return alert('Provide a name'); addContact(name,email); document.getElementById('contactName').value=''; document.getElementById('contactEmail').value=''; });
      document.getElementById('addSimBtn').addEventListener('click', ()=>{ const label=document.getElementById('simLabel').value.trim(); if(!state.selectedContactId) return alert('Select contact'); addSimToContact(state.selectedContactId,label); document.getElementById('simLabel').value=''; });
      document.getElementById('sendBtn').addEventListener('click', ()=>{ const text=document.getElementById('messageInput').value.trim(); if(!text) return; if(!state.activeSimId) return alert('Select active SIM'); if(!state.recipientSimId) return alert('Select recipient SIM'); sendMessage(text,state.activeSimId,state.recipientSimId); document.getElementById('messageInput').value=''; });
      document.getElementById('exportBtn').addEventListener('click', exportJSON); document.getElementById('downloadDump').addEventListener('click', exportJSON); document.getElementById('clearBtn').addEventListener('click', clearAll);
      document.getElementById('importBtn').addEventListener('click', ()=>document.getElementById('importFile').click()); document.getElementById('importFile').addEventListener('change',(e)=>{ const f=e.target.files[0]; if(f) importJSONFile(f); e.target.value=''; });
      if(state.contacts.length && !state.selectedContactId) state.selectedContactId = state.contacts[0].id;
      if(!state.activeSimId){ const sims = getAllSims(); if(sims.length) state.activeSimId = sims[0].sim.id; }
      renderAll();
    });
  })();
  </script>
</body>
