<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Chat V4</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.hidden { display: none; }

/* Auth */
.auth {
  display: flex;
  flex-direction: column;
  width: 300px;
  margin: 100px auto;
}

input {
  margin: 5px 0;
  padding: 10px;
  border: none;
}

button {
  padding: 10px;
  background: #3b82f6;
  border: none;
  color: white;
  cursor: pointer;
}

/* Chat */
.chat {
  display: flex;
  height: 100vh;
}

.sidebar {
  width: 200px;
  background: #020617;
  padding: 10px;
}

.room {
  padding: 10px;
  cursor: pointer;
}

.messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
}

.msg {
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
  max-width: 60%;
}

.me { background: #3b82f6; margin-left: auto; }
.other { background: #334155; }

.typing {
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth" class="auth">
  <h2>Connexion</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="login()">Se connecter</button>
  <button onclick="register()">Créer compte</button>
</div>

<!-- CHAT -->
<div id="chat" class="chat hidden">
  <div class="sidebar">
    <div onclick="changeRoom('global')" class="room">🌍 Global</div>
    <div onclick="changeRoom('gaming')" class="room">🎮 Gaming</div>
  </div>

  <div style="flex:1; display:flex; flex-direction:column;">
    <div id="messages" class="messages"></div>
    <div id="typing" class="typing"></div>

    <input id="message" placeholder="Message..." oninput="typingEvent()">
    <input type="file" id="file">
    <button onclick="sendMessage()">Envoyer</button>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

<script>
const config = {
  apiKey: "846140280738",
  authDomain: "messagerie.firebaseapp.com",
  databaseURL: "https://messagerie-cd2ba-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId: "messagerie",
  storageBucket: "messagerie.appspot.com"
};

firebase.initializeApp(config);

const auth = firebase.auth();
const db = firebase.database();
const storage = firebase.storage();

let user;
let room = "global";

// AUTH
function register() {
  auth.createUserWithEmailAndPassword(
    email.value, password.value
  );
}

function login() {
  auth.signInWithEmailAndPassword(
    email.value, password.value
  );
}

auth.onAuthStateChanged(u => {
  if (u) {
    user = u;
    authDiv.style.display = "none";
    chat.classList.remove("hidden");

    // statut online
    db.ref("status/" + user.uid).set(true);
    db.ref("status/" + user.uid).onDisconnect().set(false);

    loadMessages();
  }
});

// ROOM
function changeRoom(r) {
  room = r;
  messages.innerHTML = "";
  loadMessages();
}

// SEND
function sendMessage() {
  const text = message.value;
  const file = fileInput.files[0];

  if (!text && !file) return;

  if (file) {
    const ref = storage.ref("images/" + Date.now());
    ref.put(file).then(snapshot =>
      snapshot.ref.getDownloadURL().then(url => {
        pushMsg(text, url);
      })
    );
  } else {
    pushMsg(text, null);
  }

  message.value = "";
}

function pushMsg(text, image) {
  db.ref("rooms/" + room).push({
    uid: user.uid,
    text,
    image,
    time: new Date().toLocaleTimeString()
  });
}

// LOAD
function loadMessages() {
  db.ref("rooms/" + room).on("child_added", snap => {
    const msg = snap.val();

    const div = document.createElement("div");
    div.className = "msg " + (msg.uid === user.uid ? "me" : "other");

    div.innerHTML = `
      ${msg.text || ""}
      ${msg.image ? `<img src="${msg.image}" width="150">` : ""}
      <div>${msg.time}</div>
    `;

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  });
}

// TYPING
function typingEvent() {
  db.ref("typing/" + room + "/" + user.uid).set(true);

  setTimeout(() => {
    db.ref("typing/" + room + "/" + user.uid).remove();
  }, 1000);
}

db.ref("typing/" + room).on("value", snap => {
  typing.innerHTML = snap.exists() ? "Quelqu’un écrit..." : "";
});
</script>

</body>
</html>
