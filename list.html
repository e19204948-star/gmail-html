<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Listing — Virtual SIM</title>
  <style>
    /* Réutilisation de tes variables CSS pour la cohérence */
    :root {
      --bg: #f8fafc; --card: #ffffff; --accent: #2563eb; --accent-light: #eff6ff;
      --muted: #64748b; --border: #e2e8f0; --text: #0f172a; --text-secondary: #475569;
      --radius: 12px; --radius-sm: 8px; --shadow: 0 1px 3px rgba(0,0,0,0.06);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --accent-light: #1e3a5f;
        --muted: #94a3b8; --border: #334155; --text: #f1f5f9; --text-secondary: #94a3b8;
      }
    }
    body { font-family: Inter, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; }
    nav { display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 60px; background: var(--card); border-bottom: 1px solid var(--border); }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); font-weight: 600; }
    .logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; }
    .container { max-width: 1000px; margin: 40px auto; padding: 0 24px; }
    
    /* Stats Cards */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: var(--radius); }
    .stat-val { font-size: 24px; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; margin-top: 4px; }

    /* Table Styling */
    .table-wrapper { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
    table { width: 100%; border-collapse: collapse; text-align: left; font-size: 14px; }
    th { padding: 12px 16px; background: var(--bg); color: var(--muted); font-weight: 600; font-size: 12px; border-bottom: 1px solid var(--border); }
    td { padding: 16px; border-bottom: 1px solid var(--border); }
    .mono { font-family: monospace; color: var(--muted); font-size: 12px; }
    .badge { padding: 4px 8px; border-radius: 6px; background: var(--accent-light); color: var(--accent); font-size: 11px; font-weight: 600; }
    .empty { padding: 60px; text-align: center; color: var(--muted); }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo"><div class="logo-icon"></div><span>Virtual SIM</span></a>
    <div style="display:flex; gap:10px;">
      <a href="esim.html" style="text-decoration:none; color:var(--text-secondary); font-size:14px;">Generator</a>
      <a href="list.html" style="text-decoration:none; color:var(--accent); font-size:14px; font-weight:600;">Listing</a>
    </div>
  </nav>

  <main class="container">
    <div class="stats">
      <div class="stat-card"><div id="total-sim" class="stat-val">0</div><div class="stat-label">eSIMs Active</div></div>
      <div class="stat-card"><div id="operators-count" class="stat-val">0</div><div class="stat-label">Operators</div></div>
    </div>

    <div class="table-wrapper">
      <table id="sim-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Operator</th>
            <th>ICCID</th>
            <th>Plan</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="sim-list"></tbody>
      </table>
      <div id="no-data" class="empty" style="display:none;">No profiles found in local storage.</div>
    </div>
  </main>

  <script>
    const profiles = JSON.parse(localStorage.getItem('esim_profiles_v1') || '[]');
    const list = document.getElementById('sim-list');
    
    document.getElementById('total-sim').textContent = profiles.length;
    document.getElementById('operators-count').textContent = new Set(profiles.map(p => p.operator)).size;

    if (profiles.length === 0) {
      document.getElementById('sim-table').style.display = 'none';
      document.getElementById('no-data').style.display = 'block';
    } else {
      list.innerHTML = profiles.map(p => `
        <tr>
          <td><strong>${p.name}</strong></td>
          <td>${p.operator}</td>
          <td class="mono">${p.iccid}</td>
          <td><span class="badge">${p.planType}</span></td>
          <td><span style="color:#16a34a">● Active</span></td>
        </tr>
      `).join('');
    }
  </script>
</body>
</html>
