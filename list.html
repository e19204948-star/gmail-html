<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Listing — Contacts & eSIMs</title>
  <style>
    :root{--bg:#f4f6f8;--card:#fff;--accent:#2563eb;--muted:#6b7280}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial;background:var(--bg);color:#111}
    header{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:linear-gradient(90deg,#fff,#f7fafc);border-bottom:1px solid #e6e9ee}
    h1{font-size:18px;margin:0}
    a.back{color:var(--accent);text-decoration:none;border:1px solid rgba(37,99,235,.08);padding:6px 8px;border-radius:6px}
    .wrap{padding:14px;display:grid;grid-template-columns:1fr 420px;gap:14px}
    .panel{background:var(--card);border-radius:8px;padding:12px;box-shadow:0 1px 3px rgba(16,24,40,0.04);min-height:320px}
    table{width:100%;border-collapse:collapse}
    th,td{padding:8px;border-bottom:1px solid #f1f5f9;text-align:left}
    th{background:#fbfdff;font-weight:600}
    .small{font-size:12px;color:var(--muted)}
    .controls{display:flex;gap:8px;align-items:center;margin-bottom:8px}
    button{background:var(--accent);color:#fff;border:0;padding:8px 10px;border-radius:6px;cursor:pointer}
    button.secondary{background:transparent;color:var(--accent);border:1px solid rgba(37,99,235,.12)}
  </style>
</head>
<body>
  <header>
    <h1>Listing — Contacts & eSIMs</h1>
    <div>
      <a class="back" href="index.html">← Back</a>
      <a class="back" href="esim.html" style="margin-left:8px">eSIM Generator</a>
    </div>
  </header>

  <main class="wrap">
    <section class="panel">
      <div class="controls">
        <button id="refreshBtn">Refresh</button>
        <button id="importBtn" class="secondary">Import JSON</button>
        <input id="importFile" type="file" accept="application/json" style="display:none" />
        <button id="exportContacts" class="secondary">Export contacts JSON</button>
        <button id="exportEsims" class="secondary">Export eSIMs JSON</button>
        <button id="exportAll" class="secondary">Export all</button>
      </div>

      <h3>Contacts</h3>
      <div class="small">Shows `name`, `email`, and associated SIMs (label + number)</div>
      <div id="contactsContainer"></div>
    </section>

    <aside class="panel">
      <h3>eSIM Profiles</h3>
      <div class="small">Profiles generated by the eSIM generator</div>
      <div id="esimContainer" style="margin-top:8px"></div>

      <hr />

      <h4>Messages summary</h4>
      <div id="messagesSummary" class="small">—</div>
    </aside>
  </main>

  <script>
  (function(){
    const KEY = 'virtual_sim_comms_v1';
    const ESIM_KEY = 'esim_profiles_v1';

    function loadContacts(){ try{ const raw = localStorage.getItem(KEY); if(!raw) return []; const parsed = JSON.parse(raw); return parsed.contacts || []; }catch(e){console.error(e); return []; } }
    function loadMessages(){ try{ const raw = localStorage.getItem(KEY); if(!raw) return []; const parsed = JSON.parse(raw); return parsed.messages || []; }catch(e){return []; } }
    function loadEsims(){ try{ const raw = localStorage.getItem(ESIM_KEY); if(!raw) return []; return JSON.parse(raw) || []; }catch(e){console.error(e); return []; } }

    function saveContactsList(list){ const msgs = loadMessages(); localStorage.setItem(KEY, JSON.stringify({contacts:list, messages: msgs})); }
    function saveMessagesList(list){ const contacts = loadContacts(); localStorage.setItem(KEY, JSON.stringify({contacts:contacts, messages: list})); }
    function saveEsimsList(list){ localStorage.setItem(ESIM_KEY, JSON.stringify(list)); }

    function escapeHtml(s){ if(!s) return ''; return String(s).replace(/[&<>"']/g, (m)=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m])); }

    function renderContacts(){ const container = document.getElementById('contactsContainer'); const contacts = loadContacts(); if(!contacts.length){ container.innerHTML = '<div class="small">No contacts found</div>'; return; } const rows = contacts.map(c=>{ const sims = (c.sims||[]).map(s=>('<div class="small">'+escapeHtml(s.label||'SIM')+' — '+escapeHtml(s.number||'')+'</div>')).join(''); return '<div style="padding:8px;border-radius:6px;border:1px solid #f1f5f9;margin-bottom:8px"><strong>'+escapeHtml(c.name)+'</strong><div class="small">'+escapeHtml(c.email||'')+'</div><div style="margin-top:6px">'+sims+'</div></div>'; }).join(''); container.innerHTML = rows; }

    function renderEsims(){ const container = document.getElementById('esimContainer'); const esims = loadEsims(); if(!esims.length){ container.innerHTML = '<div class="small">No eSIM profiles found</div>'; return; } const rows = esims.map(p=>{ return '<div style="padding:8px;border-radius:6px;border:1px solid #f1f5f9;margin-bottom:8px"><strong>'+escapeHtml(p.name||'')+'</strong><div class="small">Operator: '+escapeHtml(p.operator||'')+'</div><div class="small">ICCID: '+escapeHtml(p.iccid||'')+'</div><div class="small">EID: '+escapeHtml(p.eid||'')+'</div><div class="small">SM‑DP+: '+escapeHtml(p.smDp||'')+'</div></div>'; }).join(''); container.innerHTML = rows; }

    function renderMessagesSummary(){ const el = document.getElementById('messagesSummary'); const msgs = loadMessages(); el.textContent = msgs.length ? (msgs.length + ' messages stored') : 'No messages'; }

    function exportJson(name, data){ const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = name; a.click(); URL.revokeObjectURL(a.href); }

    document.addEventListener('DOMContentLoaded', ()=>{
      renderContacts(); renderEsims(); renderMessagesSummary();
      document.getElementById('refreshBtn').addEventListener('click', ()=>{ renderContacts(); renderEsims(); renderMessagesSummary(); });
      document.getElementById('importBtn').addEventListener('click', ()=>{ document.getElementById('importFile').click(); });
      document.getElementById('importFile').addEventListener('change', function(e){ const f = e.target.files[0]; if(!f) return; const r = new FileReader(); r.onload = function(ev){ try{ const parsed = JSON.parse(ev.target.result);
            // handle all-data object
            if(parsed && parsed.contacts && Array.isArray(parsed.contacts)){
              const existing = loadContacts(); parsed.contacts.forEach(c=>{ if(!existing.find(ex=>ex.id===c.id)) existing.push(c); }); saveContactsList(existing);
            }
            if(parsed && parsed.messages && Array.isArray(parsed.messages)){
              const existing = loadMessages(); parsed.messages.forEach(m=>{ if(!existing.find(ex=>ex.id===m.id)) existing.push(m); }); saveMessagesList(existing);
            }
            if(parsed && (parsed.esims || parsed.esim_profiles || parsed.profiles) && Array.isArray(parsed.esims || parsed.esim_profiles || parsed.profiles)){
              const arr = parsed.esims || parsed.esim_profiles || parsed.profiles;
              const existing = loadEsims(); arr.forEach(p=>{ if(!existing.find(ex=>ex.id===p.id)) existing.push(p); }); saveEsimsList(existing);
            }
            // handle arrays: try to detect type
            if(Array.isArray(parsed)){
              if(parsed.length && (parsed[0].iccid || parsed[0].eid)){
                const existing = loadEsims(); parsed.forEach(p=>{ if(!existing.find(ex=>ex.id===p.id)) existing.push(p); }); saveEsimsList(existing);
              } else if(parsed.length && parsed[0].name){
                const existing = loadContacts(); parsed.forEach(c=>{ if(!existing.find(ex=>ex.id===c.id)) existing.push(c); }); saveContactsList(existing);
              } else if(parsed.length && parsed[0].from && parsed[0].to){
                const existing = loadMessages(); parsed.forEach(m=>{ if(!existing.find(ex=>ex.id===m.id)) existing.push(m); }); saveMessagesList(existing);
              }
            }
            // handle single objects
            if(parsed && parsed.iccid && parsed.id){ const existing = loadEsims(); if(!existing.find(ex=>ex.id===parsed.id)) existing.push(parsed); saveEsimsList(existing); }
            else if(parsed && parsed.name){ const existing = loadContacts(); if(!existing.find(ex=>ex.id===parsed.id)) existing.push(parsed); saveContactsList(existing); }

            renderContacts(); renderEsims(); renderMessagesSummary(); alert('Import complete');
          }catch(err){ alert('Invalid JSON'); } }; r.readAsText(f); e.target.value=''; });
      document.getElementById('exportContacts').addEventListener('click', ()=>{ const contacts = loadContacts(); exportJson('contacts.json', contacts); });
      document.getElementById('exportEsims').addEventListener('click', ()=>{ const esims = loadEsims(); exportJson('esim_profiles.json', esims); });
      document.getElementById('exportAll').addEventListener('click', ()=>{ const out = {contacts: loadContacts(), esims: loadEsims(), messages: loadMessages()}; exportJson('all_data.json', out); });
    });
  })();
  </script>
</body>
</html>
