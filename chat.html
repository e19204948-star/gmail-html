<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Chat — Virtual SIM</title>
  <style>
    :root{--bg:#f8fafc;--card:#fff;--accent:#2563eb;--accent-light:#eff6ff;--accent-hover:#1d4ed8;--muted:#64748b;--border:#e2e8f0;--text:#0f172a;--text-secondary:#475569;--danger:#ef4444;--danger-bg:#fef2f2;--radius:12px;--radius-sm:8px;--shadow:0 1px 3px rgba(0,0,0,0.06)}
    @media(prefers-color-scheme:dark){:root{--bg:#0f172a;--card:#1e293b;--accent:#3b82f6;--accent-light:#1e3a5f;--accent-hover:#60a5fa;--muted:#94a3b8;--border:#334155;--text:#f1f5f9;--text-secondary:#94a3b8;--danger:#f87171;--danger-bg:#450a0a}}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Inter,system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
    nav{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:60px;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;flex-shrink:0}
    .logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text)}
    .logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
    .logo-text{font-size:16px;font-weight:600;letter-spacing:-0.02em}
    .nav-right{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
    .nav-link{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:var(--radius-sm);text-decoration:none;font-size:14px;font-weight:500;color:var(--text-secondary);transition:background 0.15s,color 0.15s;border:1px solid transparent}
    .nav-link:hover,.nav-link.active{background:var(--accent-light);color:var(--accent);border-color:rgba(37,99,235,0.2)}
    .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;border:1px solid transparent;cursor:pointer;font-family:inherit;transition:all 0.15s}
    .btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-hover)}
    .btn-ghost{background:transparent;color:var(--text-secondary);border-color:var(--border)}.btn-ghost:hover{background:var(--bg);color:var(--text)}
    .btn-danger{background:transparent;color:var(--danger);border-color:rgba(239,68,68,0.25);font-size:12px}.btn-danger:hover{background:var(--danger-bg)}
    .layout{display:grid;grid-template-columns:260px 270px 1fr;flex:1;overflow:hidden}
    .panel{background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
    .panel-header{padding:14px 16px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
    .panel-title{font-size:13px;font-weight:600;margin-bottom:10px}
    .panel-body{padding:10px 12px;overflow-y:auto;flex:1}
    .form-row{display:flex;gap:6px;margin-bottom:8px}
    select,input{padding:7px 10px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-family:inherit;transition:border-color 0.15s;width:100%}
    select:focus,input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,0.1)}
    .contact-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:var(--radius-sm);cursor:pointer;margin-bottom:2px;border:1px solid transparent;transition:all 0.15s}
    .contact-item:hover{background:var(--accent-light);border-color:rgba(37,99,235,0.15)}
    .contact-item.selected{background:var(--accent-light);border-color:rgba(37,99,235,0.25)}
    .contact-name{font-size:13px;font-weight:500}.contact-meta{font-size:11px;color:var(--muted);margin-top:2px}
    .sim-count{background:var(--border);color:var(--text-secondary);font-size:10px;font-weight:600;padding:1px 6px;border-radius:999px}
    .sim-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
    .sim-label{font-size:13px;font-weight:500}.sim-number{font-size:10px;font-family:monospace;color:var(--muted);margin-top:2px}
    .icon-btn{width:26px;height:26px;border-radius:6px;border:1px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);transition:all 0.15s}
    .icon-btn:hover{background:var(--accent-light);color:var(--accent);border-color:var(--accent)}
    .icon-btn.danger:hover{background:var(--danger-bg);color:var(--danger);border-color:var(--danger)}
    .chat-panel{display:flex;flex-direction:column;overflow:hidden}
    .chat-top{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;align-items:center;background:var(--card)}
    .chat-log{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
    .msg{max-width:72%;padding:9px 13px;border-radius:12px;font-size:13px;line-height:1.5}
    .msg.out{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
    .msg.in{background:var(--card);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:4px}
    .msg-time{font-size:10px;opacity:0.6;margin-top:3px}
    .msg-enc{font-style:italic;opacity:0.7}
    .chat-input{padding:12px 16px;border-top:1px solid var(--border);display:flex;gap:8px;flex-shrink:0;background:var(--card)}
    .chat-footer{padding:6px 16px 10px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;background:var(--card)}
    .status-text{font-size:11px;color:var(--muted)}
    .empty-chat{text-align:center;color:var(--muted);font-size:13px;margin:auto;padding:40px}
    .lock-badge{display:inline-flex;align-items:center;gap:4px;background:#f0fdf4;color:#15803d;font-size:10px;font-weight:600;padding:2px 7px;border-radius:999px;margin-left:4px}
    @media(prefers-color-scheme:dark){.lock-badge{background:#052e16;color:#4ade80}}
    .sim-select{max-width:220px}
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="logo">
      <div class="logo-icon"><svg width="18" height="18" fill="none" stroke="#fff" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg></div>
      <span class="logo-text">Virtual SIM</span>
    </a>
    <div class="nav-right">
      <select id="activeSimSelect" class="sim-select" style="font-size:12px"></select>
      <a href="esim.html" class="nav-link">eSIMs</a>
      <a href="list.html" class="nav-link">Listing</a>
      <button id="exportBtn" class="btn btn-ghost" style="font-size:12px">Export</button>
      <button id="importBtn" class="btn btn-ghost" style="font-size:12px">Import</button>
      <button id="clearBtn" class="btn btn-danger">Clear all</button>
      <input id="importFile" type="file" accept="application/json" style="display:none" />
    </div>
  </nav>

  <div class="layout">
    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">Contacts</div>
        <div class="form-row"><input id="contactName" placeholder="Name" /><input id="contactEmail" placeholder="Email" /><button id="addContactBtn" class="btn btn-primary" style="padding:7px 10px;white-space:nowrap">Add</button></div>
        <div class="form-row"><button id="importEsimBtn" class="btn btn-ghost" style="font-size:12px;width:100%">Import eSIM</button><input id="importEsimFile" type="file" accept="application/json" style="display:none" /></div>
      </div>
      <div class="panel-body"><ul id="contactsList" style="list-style:none;padding:0;margin:0"></ul></div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div class="panel-title">SIMs</div>
        <div id="simsControls" style="display:none">
          <div class="form-row"><input id="simLabel" placeholder="Label (e.g. Work)" /><input id="simNumber" placeholder="ICCID (optional)" /><button id="addSimBtn" class="btn btn-primary" style="padding:7px 10px;white-space:nowrap">Add</button></div>
        </div>
        <div id="simsForContactHeader" style="font-size:12px;color:var(--muted)">Select a contact</div>
      </div>
      <div class="panel-body" id="simsList"></div>
    </div>

    <div class="chat-panel">
      <div class="chat-top">
        <select id="recipientContactSelect" style="font-size:12px"></select>
        <select id="recipientSimSelect" style="font-size:12px"></select>
        <span class="lock-badge"><svg width="9" height="9" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg> E2E encrypted</span>
      </div>
      <div id="chatLog" class="chat-log"><div class="empty-chat">Select an active SIM and a recipient to start chatting.</div></div>
      <div class="chat-input"><input id="messageInput" placeholder="Type a message…" /><button id="sendBtn" class="btn btn-primary">Send</button></div>
      <div class="chat-footer"><div id="statusInfo" class="status-text">No SIM selected</div><button id="downloadDump" class="btn btn-ghost" style="font-size:12px">Download dump</button></div>
    </div>
  </div>

<script>
(()=>{
  const KEY="virtual_sim_comms_v1";
  let state={contacts:[],messages:[],selectedContactId:null,activeSimId:null,recipientContactId:null,recipientSimId:null};
  const uid=(p="id")=>p+"_"+Math.random().toString(36).slice(2,9);
  function save(){localStorage.setItem(KEY,JSON.stringify({contacts:state.contacts,messages:state.messages}));}
  function load(){const r=localStorage.getItem(KEY);if(!r)return;try{const p=JSON.parse(r);state.contacts=p.contacts||[];state.messages=p.messages||[];}catch(e){}}
  function getAllSims(){let l=[];state.contacts.forEach(c=>(c.sims||[]).forEach(s=>l.push({contactId:c.id,contactName:c.name,sim:s})));return l;}
  const ab2b64=b=>{let s="";const u=new Uint8Array(b),c=0x8000;for(let i=0;i<u.length;i+=c)s+=String.fromCharCode.apply(null,u.subarray(i,i+c));return btoa(s);};
  const b642ab=b=>{const bin=atob(b),u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u.buffer;};
  const genKP=()=>crypto.subtle.generateKey({name:"ECDH",namedCurve:"P-256"},true,["deriveKey","deriveBits"]);
  const impPub=j=>crypto.subtle.importKey("jwk",j,{name:"ECDH",namedCurve:"P-256"},false,[]);
  const impPriv=j=>crypto.subtle.importKey("jwk",j,{name:"ECDH",namedCurve:"P-256"},false,["deriveBits","deriveKey"]);
  async function deriveKey(priv,pub,salt){const bits=await crypto.subtle.deriveBits({name:"ECDH",public:pub},priv,256);const base=await crypto.subtle.importKey("raw",bits,{name:"HKDF"},false,["deriveKey"]);return crypto.subtle.deriveKey({name:"HKDF",hash:"SHA-256",salt,info:new Uint8Array([])},base,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]);}
  async function encMsg(txt,fs,ts){const priv=await impPriv(fs.privKey),pub=await impPub(ts.pubKey);const salt=crypto.getRandomValues(new Uint8Array(16)),iv=crypto.getRandomValues(new Uint8Array(12));const key=await deriveKey(priv,pub,salt.buffer);const ct=await crypto.subtle.encrypt({name:"AES-GCM",iv},key,new TextEncoder().encode(txt));return{ciphertext:ab2b64(ct),iv:ab2b64(iv.buffer),salt:ab2b64(salt.buffer)};}
  async function decMsg(msg,simId){const own=findSimById(simId);if(!own?.sim?.privKey)throw new Error("no key");const otherId=msg.from===simId?msg.to:msg.from;const other=findSimById(otherId);if(!other?.sim?.pubKey)throw new Error("no pub");const priv=await impPriv(own.sim.privKey),pub=await impPub(other.sim.pubKey);const key=await deriveKey(priv,pub,b642ab(msg.salt));const plain=await crypto.subtle.decrypt({name:"AES-GCM",iv:new Uint8Array(b642ab(msg.iv))},key,b642ab(msg.ciphertext));return new TextDecoder().decode(plain);}
  const esc=s=>s?String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])):"";
  function findSimById(id){for(const c of state.contacts)for(const s of(c.sims||[]))if(s.id===id)return{contact:c,sim:s,contactName:c.name};return null;}
  function renderContacts(){const el=document.getElementById("contactsList");el.innerHTML="";if(!state.contacts.length){el.innerHTML="<div style='font-size:13px;color:var(--muted);padding:16px 0;text-align:center'>No contacts yet</div>";return;}state.contacts.forEach(c=>{const li=document.createElement("li");li.className="contact-item"+(state.selectedContactId===c.id?" selected":"");li.innerHTML="<div><div class='contact-name'>"+esc(c.name)+"</div><div class='contact-meta'>"+esc(c.email||"")+"</div></div><span class='sim-count'>"+(c.sims||[]).length+"</span>";li.addEventListener("click",()=>selectContact(c.id));el.appendChild(li);});}
  function renderSims(){const h=document.getElementById("simsForContactHeader"),ctrl=document.getElementById("simsControls"),list=document.getElementById("simsList");list.innerHTML="";const c=state.contacts.find(x=>x.id===state.selectedContactId);if(!c){h.textContent="Select a contact";ctrl.style.display="none";return;}h.textContent="SIMs for "+c.name;ctrl.style.display="block";(c.sims||[]).forEach(s=>{const d=document.createElement("div");d.className="sim-card";d.innerHTML="<div><div class='sim-label'>"+esc(s.label||"SIM")+"</div><div class='sim-number'>"+esc(s.number)+"</div></div><div style='display:flex;gap:4px'><button class='icon-btn' data-sel='"+s.id+"'><svg width='11' height='11' fill='none' stroke='currentColor' stroke-width='2' viewBox='0 0 24 24'><path d='M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z'/></svg></button><button class='icon-btn danger' data-del='"+s.id+"'><svg width='11' height='11' fill='none' stroke='currentColor' stroke-width='2' viewBox='0 0 24 24'><polyline points='3 6 5 6 21 6'/><path d='M19 6l-1 14H6L5 6'/></svg></button></div>";list.appendChild(d);d.querySelector("[data-sel]").addEventListener("click",()=>{state.recipientSimId=s.id;renderRecipientSelect();renderChat();});d.querySelector("[data-del]").addEventListener("click",()=>{if(!confirm("Delete SIM?"))return;c.sims=(c.sims||[]).filter(x=>x.id!==s.id);if(state.activeSimId===s.id)state.activeSimId=null;if(state.recipientSimId===s.id)state.recipientSimId=null;save();renderAll();});});}
  function renderActiveSimSelect(){const sel=document.getElementById("activeSimSelect");sel.innerHTML="<option value=''>Active SIM (you)</option>";getAllSims().forEach(e=>{const o=document.createElement("option");o.value=e.sim.id;o.textContent=e.contactName+" — "+e.sim.label;sel.appendChild(o);});sel.value=state.activeSimId||"";sel.onchange=e=>{state.activeSimId=e.target.value||null;save();renderChat();renderStatus();};}
  function renderRecipientContactSelect(){const sel=document.getElementById("recipientContactSelect");sel.innerHTML="<option value=''>Recipient contact</option>";state.contacts.forEach(c=>{const o=document.createElement("option");o.value=c.id;o.textContent=c.name;sel.appendChild(o);});sel.value=state.recipientContactId||"";sel.onchange=e=>{state.recipientContactId=e.target.value||null;if(state.recipientContactId){const c=state.contacts.find(x=>x.id===state.recipientContactId);state.recipientSimId=c&&(c.sims||[]).length?c.sims[0].id:null;}renderRecipientSelect();renderChat();};}
  function renderRecipientSelect(){const sel=document.getElementById("recipientSimSelect");sel.innerHTML="<option value=''>Recipient SIM</option>";let sims=[];if(state.recipientContactId){const c=state.contacts.find(x=>x.id===state.recipientContactId);if(c)sims=(c.sims||[]).map(s=>({contactId:c.id,contactName:c.name,sim:s}));}else sims=getAllSims();sims.forEach(e=>{const o=document.createElement("option");o.value=e.sim.id;o.textContent=e.contactName+" — "+e.sim.label;sel.appendChild(o);});sel.value=state.recipientSimId||"";sel.onchange=e=>{state.recipientSimId=e.target.value||null;renderChat();};}
  function renderChat(){const log=document.getElementById("chatLog");log.innerHTML="";const from=state.activeSimId;let to=state.recipientSimId;if(!to&&state.recipientContactId){const c=state.contacts.find(x=>x.id===state.recipientContactId);if(c&&(c.sims||[]).length)to=c.sims[0].id;}if(!from||!to){log.innerHTML="<div class='empty-chat'>Select an active SIM and a recipient to start chatting.</div>";renderStatus();return;}const msgs=state.messages.filter(m=>(m.from===from&&m.to===to)||(m.from===to&&m.to===from)).sort((a,b)=>a.ts-b.ts);if(!msgs.length){log.innerHTML="<div class='empty-chat'>No messages yet. Say hello!</div>";renderStatus();return;}msgs.forEach(m=>{const d=document.createElement("div");d.className="msg "+(m.from===from?"out":"in");const time=new Date(m.ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});if(m.enc){d.innerHTML="<div class='msg-enc'>Decrypting…</div><div class='msg-time'>"+time+"</div>";if(state.activeSimId&&(m.from===state.activeSimId||m.to===state.activeSimId)){decMsg(m,state.activeSimId).then(p=>{d.innerHTML="<div>"+esc(p)+"</div><div class='msg-time'>"+time+"</div>";}).catch(()=>{d.innerHTML="<div class='msg-enc'>Could not decrypt</div><div class='msg-time'>"+time+"</div>";});}}else{d.innerHTML="<div>"+esc(m.text)+"</div><div class='msg-time'>"+time+"</div>";}log.appendChild(d);});log.scrollTop=log.scrollHeight;renderStatus();}
  function renderStatus(){const s=document.getElementById("statusInfo");if(!state.activeSimId){s.textContent="No active SIM";return;}const a=findSimById(state.activeSimId),r=state.recipientSimId?findSimById(state.recipientSimId):null;s.textContent="Using: "+(a?a.contactName+" — "+a.sim.label:"Unknown")+(r?" · Chatting with: "+r.contactName+" — "+r.sim.label:"");}
  function addContact(name,email){const id=uid("c");state.contacts.push({id,name,email,sims:[]});save();renderAll();selectContact(id);}
  async function addSim(cid,label,number){const c=state.contacts.find(x=>x.id===cid);if(!c)return;const id=uid("s");const num=number&&String(number).trim()?String(number).trim():(Math.floor(100000000000+Math.random()*900000000000).toString());try{const kp=await genKP();const pub=await crypto.subtle.exportKey("jwk",kp.publicKey);const priv=await crypto.subtle.exportKey("jwk",kp.privateKey);c.sims=c.sims||[];c.sims.push({id,label:label||"SIM",number:num,pubKey:pub,privKey:priv});}catch{c.sims=c.sims||[];c.sims.push({id,label:label||"SIM",number:num});}save();renderAll();state.recipientSimId=id;renderChat();}
  async function sendMessage(txt,from,to){if(!txt||!from||!to)return;const fe=findSimById(from),te=findSimById(to);if(fe?.sim?.privKey&&te?.sim?.pubKey){try{const enc=await encMsg(txt,fe.sim,te.sim);state.messages.push({id:uid("m"),from,to,enc:true,...enc,ts:Date.now()});save();renderChat();return;}catch(err){console.error(err);}}state.messages.push({id:uid("m"),from,to,text:txt,ts:Date.now()});save();renderChat();}
  function selectContact(id){state.selectedContactId=id;renderSims();renderContacts();}
  function exportJSON(){const b=new Blob([JSON.stringify({contacts:state.contacts,messages:state.messages},null,2)],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="virtual_sim_export.json";a.click();URL.revokeObjectURL(a.href);}
  function importJSON(file){const r=new FileReader();r.onload=e=>{try{const p=JSON.parse(e.target.result);if(Array.isArray(p.contacts))state.contacts=p.contacts;if(Array.isArray(p.messages))state.messages=p.messages;save();renderAll();}catch{alert("Invalid JSON");}};r.readAsText(file);}
  async function importEsim(file){const r=new FileReader();r.onload=async e=>{try{const p=JSON.parse(e.target.result);let profiles=Array.isArray(p)?p:(p&&(p.iccid||p.eid||p.activationCode||p.profileName||p.operator))?[p]:Array.isArray(p?.profiles)?p.profiles:[];if(!profiles.length){alert("No eSIM profiles found");return;}const attach=!!state.selectedContactId&&confirm("Add to selected contact? OK=yes, Cancel=new contacts");for(const prof of profiles){const label=prof.profileName||prof.operator||"eSIM";const num=prof.iccid||prof.activationCode||prof.eid||Math.floor(100000000000+Math.random()*900000000000).toString();if(attach){const c=state.contacts.find(x=>x.id===state.selectedContactId);if(c)await addSim(c.id,label,num);}else{const cid=uid("c");state.contacts.push({id:cid,name:prof.profileName||prof.operator||("eSIM "+num.slice(-6)),email:"",sims:[]});await addSim(cid,label,num);}}save();renderAll();}catch(err){console.error(err);alert("Invalid JSON");}};r.readAsText(file);}
  function clearAll(){if(!confirm("Clear all data?"))return;state.contacts=[];state.messages=[];state.activeSimId=null;state.recipientSimId=null;save();renderAll();}
  function renderAll(){renderContacts();renderSims();renderActiveSimSelect();renderRecipientContactSelect();renderRecipientSelect();renderChat();}
  document.addEventListener("DOMContentLoaded",()=>{
    load();renderAll();
    document.getElementById("addContactBtn").addEventListener("click",()=>{const n=document.getElementById("contactName").value.trim();const e=document.getElementById("contactEmail").value.trim();if(!n)return alert("Enter a name");addContact(n,e);document.getElementById("contactName").value="";document.getElementById("contactEmail").value="";});
    document.getElementById("addSimBtn").addEventListener("click",async()=>{const l=document.getElementById("simLabel").value.trim();const n=document.getElementById("simNumber").value.trim();if(!state.selectedContactId)return alert("Select a contact first");try{await addSim(state.selectedContactId,l,n);}catch(err){console.error(err);}document.getElementById("simLabel").value="";document.getElementById("simNumber").value="";});
    document.getElementById("sendBtn").addEventListener("click",async()=>{const txt=document.getElementById("messageInput").value.trim();if(!txt)return;if(!state.activeSimId)return alert("Select active SIM");let to=state.recipientSimId;if(!to&&state.recipientContactId){const c=state.contacts.find(x=>x.id===state.recipientContactId);if(!c||(c.sims||[]).length===0)return alert("No SIM for selected contact");to=c.sims[0].id;}if(!to)return alert("Select a recipient");try{await sendMessage(txt,state.activeSimId,to);}catch(err){console.error(err);}document.getElementById("messageInput").value="";});
    document.getElementById("messageInput").addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey)document.getElementById("sendBtn").click();});
    document.getElementById("exportBtn").addEventListener("click",exportJSON);
    document.getElementById("downloadDump").addEventListener("click",exportJSON);
    document.getElementById("clearBtn").addEventListener("click",clearAll);
    document.getElementById("importBtn").addEventListener("click",()=>document.getElementById("importFile").click());
    document.getElementById("importFile").addEventListener("change",e=>{const f=e.target.files[0];if(f)importJSON(f);e.target.value="";});
    document.getElementById("importEsimBtn").addEventListener("click",()=>document.getElementById("importEsimFile").click());
    document.getElementById("importEsimFile").addEventListener("change",e=>{const f=e.target.files[0];if(f)importEsim(f);e.target.value="";});
    if(state.contacts.length&&!state.selectedContactId)state.selectedContactId=state.contacts[0].id;
    if(!state.activeSimId){const sims=getAllSims();if(sims.length)state.activeSimId=sims[0].sim.id;}
    renderAll();
  });
  window.VSIM=window.VSIM||{};
  window.VSIM.addContact=async function(name,email,sims){if(!name)return;addContact(name,email);if(Array.isArray(sims)&&state.selectedContactId)for(const s of sims){try{await addSim(state.selectedContactId,s.label,s.number);}catch(e){console.error(e);}}};
})();
</script>
</body>
</html>
